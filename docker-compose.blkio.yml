# Linux-only blkio stress override.
# Use with:
#   docker compose -f docker-compose.yml -f docker-compose.blkio.yml up -d
# Requires host block device visibility (e.g. /dev/vda) from Docker runtime.

services:
  astra-node1:
    blkio_config:
      device_write_iops:
        - path: ${ASTRA_BLKIO_DEVICE:-/dev/vda}
          rate: 150
      device_write_bps:
        - path: ${ASTRA_BLKIO_DEVICE:-/dev/vda}
          rate: 10485760

  astra-node2:
    blkio_config:
      device_write_iops:
        - path: ${ASTRA_BLKIO_DEVICE:-/dev/vda}
          rate: 150
      device_write_bps:
        - path: ${ASTRA_BLKIO_DEVICE:-/dev/vda}
          rate: 10485760

  astra-node3:
    blkio_config:
      device_write_iops:
        - path: ${ASTRA_BLKIO_DEVICE:-/dev/vda}
          rate: 150
      device_write_bps:
        - path: ${ASTRA_BLKIO_DEVICE:-/dev/vda}
          rate: 10485760
