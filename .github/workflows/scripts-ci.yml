name: scripts-ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scripts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Sync script deps
        run: uv sync --project refs/scripts --extra dev

      - name: Run script unit tests
        run: uv run --project refs/scripts pytest -q refs/scripts/tests

      - name: Shell syntax check
        run: find refs/scripts -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n
