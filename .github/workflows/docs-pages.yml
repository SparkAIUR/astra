name: docs-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install script deps
        run: uv sync --project refs/scripts

      - name: Sync generated docs
        run: uv run --project refs/scripts python refs/scripts/docs/sync_docs.py

      - name: Sync public reports
        run: uv run --project refs/scripts python refs/scripts/public/generate_public_reports.py

      - name: Validate docs
        run: uv run --project refs/scripts python refs/scripts/docs/validate_docs.py

      - name: Validate public repo hygiene
        if: github.repository == 'SparkAIUR/astra'
        run: uv run --project refs/scripts python refs/scripts/public/validate_public_hygiene.py --repo .

      - name: Build
        env:
          SPARKIFY_VERSION: 0.2.3
        run: bash refs/scripts/public/run_sparkify.sh build --docs-dir ./docs --out ./dist --site "https://${{ github.repository_owner }}.github.io" --base "/${{ github.event.repository.name }}" --strict

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
