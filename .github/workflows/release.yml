name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (advisory)
        run: cargo clippy --workspace --all-targets

      - name: Test
        run: cargo test --workspace --all-targets

      - name: Crates publish dry-run (dependency-aware)
        run: bash refs/scripts/release/publish-crates.sh --version "${GITHUB_REF_NAME#v}" --dry-run

  publish-crates:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Publish crates
        run: bash refs/scripts/release/publish-crates.sh --version "${GITHUB_REF_NAME#v}"

  publish-images:
    needs: publish-crates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set tag
        id: tag
        run: echo "value=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Compute image tag sets
        id: image-tags
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          stable=true
          if [[ "$tag" == *-rc* ]]; then
            stable=false
          fi
          {
            echo "astra<<EOF"
            echo "docker.io/halceon/astra:${tag}"
            echo "docker.io/nudevco/astra:${tag}"
            if [[ "${stable}" == "true" ]]; then
              echo "docker.io/halceon/astra:latest"
              echo "docker.io/nudevco/astra:latest"
            fi
            echo "EOF"
            echo "forge<<EOF"
            echo "docker.io/halceon/astra-forge:${tag}"
            if [[ "${stable}" == "true" ]]; then
              echo "docker.io/halceon/astra-forge:latest"
            fi
            echo "EOF"
            echo "stable=${stable}"
          } >> "${GITHUB_OUTPUT}"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-arch images
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: false
          tags: ${{ steps.image-tags.outputs.astra }}

      - name: Build and push forge helper image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.forge
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: false
          tags: ${{ steps.image-tags.outputs.forge }}

  publish-release:
    needs: publish-images
    runs-on: ubuntu-latest
    env:
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Create release notes preface
        run: |
          cat > /tmp/release-preface.md <<'NOTES'
          ## Astra ${{ github.ref_name }}

          This release publishes:
          - Crates.io crates: `astra-proto`, `astra-core`, `astractl`, `astrad`, `astra-forge`
          - Multi-arch images:
            - `docker.io/halceon/astra:${{ github.ref_name }}`
            - `docker.io/nudevco/astra:${{ github.ref_name }}`
            - `docker.io/halceon/astra-forge:${{ github.ref_name }}`
          - Public docs and benchmark reports
          NOTES
          if [[ "${GITHUB_REF_NAME}" != *-rc* ]]; then
            cat >> /tmp/release-preface.md <<'NOTES'
          - Stable aliases updated:
            - `docker.io/halceon/astra:latest`
            - `docker.io/nudevco/astra:latest`
            - `docker.io/halceon/astra-forge:latest`
          NOTES
          else
            cat >> /tmp/release-preface.md <<'NOTES'
          - Stable aliases were not updated because this tag is a prerelease.
          NOTES
          fi

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          prerelease_flag=""
          if [[ "$tag" == *-rc* ]]; then
            prerelease_flag="--prerelease"
          fi
          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release edit "${tag}" --notes-file /tmp/release-preface.md ${prerelease_flag}
          else
            gh release create "${tag}" \
              --title "${tag}" \
              --generate-notes \
              --notes-file /tmp/release-preface.md \
              ${prerelease_flag}
          fi
