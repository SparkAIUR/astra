name: docs-ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install docs deps
        run: npm --prefix docs ci

      - name: Install script deps
        run: uv sync --project refs/scripts --extra dev

      - name: Regenerate docs artifacts
        run: uv run --project refs/scripts python refs/scripts/docs/sync_docs.py

      - name: Enforce generated artifacts committed
        run: |
          git diff --exit-code \
            docs/reference/config/env-vars.md \
            docs/reference/metrics/metric-catalog.md \
            docs/.meta/source-map.yaml

      - name: Validate docs metadata and links
        run: uv run --project refs/scripts python refs/scripts/docs/validate_docs.py

      - name: Check docs impact
        run: uv run --project refs/scripts python refs/scripts/docs/check_docs_impact.py

      - name: Validate public repo hygiene
        run: uv run --project refs/scripts python refs/scripts/public/validate_public_hygiene.py --repo .

      - name: Build docs
        run: npm --prefix docs run docs:build
