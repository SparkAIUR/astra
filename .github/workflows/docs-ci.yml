name: docs-ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install script deps
        run: uv sync --project refs/scripts --extra dev

      - name: Regenerate docs artifacts
        run: uv run --project refs/scripts python refs/scripts/docs/sync_docs.py

      - name: Regenerate public reports
        run: uv run --project refs/scripts python refs/scripts/public/generate_public_reports.py

      - name: Enforce generated artifacts committed
        run: |
          git diff --exit-code \
            BENCHMARKS.md \
            docs/reference/config/env-vars.md \
            docs/reference/metrics/metric-catalog.md \
            docs/research/benchmark-results.mdx \
            docs/.meta/source-map.yaml

      - name: Validate docs metadata and links
        run: uv run --project refs/scripts python refs/scripts/docs/validate_docs.py

      - name: Check docs impact
        run: uv run --project refs/scripts python refs/scripts/docs/check_docs_impact.py

      - name: Validate public repo hygiene
        if: github.repository == 'SparkAIUR/astra'
        run: uv run --project refs/scripts python refs/scripts/public/validate_public_hygiene.py --repo .

      - name: Build docs
        env:
          SPARKIFY_VERSION: 0.2.3
        run: bash refs/scripts/public/run_sparkify.sh build --docs-dir ./docs --out ./dist-ci --site "https://${{ github.repository_owner }}.github.io" --base "/${{ github.event.repository.name }}" --strict
