x-astra-base: &astra-base
  image: ${ASTRA_IMAGE:?set ASTRA_IMAGE}
  environment: *astra-env
  init: true
  restart: unless-stopped
  stop_grace_period: 60s
  security_opt:
    - seccomp:unconfined
  oom_score_adj: ${ASTRA_OOM_SCORE_ADJ:--500}
  ulimits:
    nofile:
      soft: ${ASTRA_NOFILE_SOFT:-262144}
      hard: ${ASTRA_NOFILE_HARD:-262144}
  deploy:
    resources:
      limits:
        memory: ${ASTRA_CONTAINER_MEMORY_LIMIT:-2048M}
  expose:
    - "2380"

services:
  astra-node1:
    <<: *astra-base
    ports:
      - "127.0.0.1:52379:2379"
      - "127.0.0.1:19479:9479"
    volumes:
      - ${ASTRA_NODE1_DATA:?set ASTRA_NODE1_DATA}:/app/data
    environment:
      <<: *astra-env
      ASTRAD_CLIENT_ADDR: 0.0.0.0:2379
      ASTRAD_RAFT_ADVERTISE_ADDR: astra-node1:2380
    command: ["--node-id=1", "--peers=http://astra-node1:2380,http://astra-node2:2380,http://astra-node3:2380"]

  astra-node2:
    <<: *astra-base
    ports:
      - "127.0.0.1:52391:2379"
      - "127.0.0.1:19480:9479"
    volumes:
      - ${ASTRA_NODE2_DATA:?set ASTRA_NODE2_DATA}:/app/data
    environment:
      <<: *astra-env
      ASTRAD_CLIENT_ADDR: 0.0.0.0:2379
      ASTRAD_RAFT_ADVERTISE_ADDR: astra-node2:2380
    command: ["--node-id=2", "--peers=http://astra-node1:2380,http://astra-node2:2380,http://astra-node3:2380"]

  astra-node3:
    <<: *astra-base
    ports:
      - "127.0.0.1:52392:2379"
      - "127.0.0.1:19481:9479"
    volumes:
      - ${ASTRA_NODE3_DATA:?set ASTRA_NODE3_DATA}:/app/data
    environment:
      <<: *astra-env
      ASTRAD_CLIENT_ADDR: 0.0.0.0:2379
      ASTRAD_RAFT_ADVERTISE_ADDR: astra-node3:2380
    command: ["--node-id=3", "--peers=http://astra-node1:2380,http://astra-node2:2380,http://astra-node3:2380"]
