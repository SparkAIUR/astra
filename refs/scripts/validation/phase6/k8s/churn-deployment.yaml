apiVersion: apps/v1
kind: Deployment
metadata:
  name: phase6-storm
  namespace: phase6-churn
spec:
  replicas: 1
  selector:
    matchLabels:
      app: phase6-storm
  template:
    metadata:
      labels:
        app: phase6-storm
    spec:
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.9
